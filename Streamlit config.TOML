# ═══════════════════════════════════════════════════════════════════════════════
# STREAMLIT CONFIGURATION - OPTIMIZED FOR CLOUD DEPLOYMENT
# ═══════════════════════════════════════════════════════════════════════════════
#
# Place this file in: .streamlit/config.toml
# (Create .streamlit folder in your repo root)
#
# ═══════════════════════════════════════════════════════════════════════════════

[theme]
primaryColor = "#1db954"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#262730"
textColor = "#fafafa"
font = "sans serif"

[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[runner]
magicEnabled = false
fastReruns = true

[client]
showErrorDetails = true
toolbarMode = "minimal"

# Performance optimizations
[server.fileWatcherType]
# Use polling for better compatibility
usePolling = false

# Cache settings
[global]
# Cache data for better performance
dataFrameSerialization = "arrow"

# Note: These settings optimize performance and appearance on Streamlit Cloud
